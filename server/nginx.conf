# ── Nginx reverse proxy (optionnel, si tu veux HTTPS + port 80/443) ───────────
# Copier dans /etc/nginx/sites-available/media-gallery
# puis: ln -s /etc/nginx/sites-available/media-gallery /etc/nginx/sites-enabled/
# et:   certbot --nginx -d ton-domaine.com

server {
    listen 80;
    server_name ton-domaine.com;

    # Redirect HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ton-domaine.com;

    # Certbot SSL (généré automatiquement par certbot)
    ssl_certificate     /etc/letsencrypt/live/ton-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ton-domaine.com/privkey.pem;

    # Augmenter la taille max pour les uploads (25MB + marge)
    client_max_body_size 30M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
