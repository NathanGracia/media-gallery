# ── Nginx reverse proxy ───────────────────────────────────────────────────────
# Copier dans /etc/nginx/sites-available/memoss
# ln -s /etc/nginx/sites-available/memoss /etc/nginx/sites-enabled/
# certbot --nginx -d memoss.nathangracia.com

server {
    listen 80;
    server_name memoss.nathangracia.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name memoss.nathangracia.com;

    ssl_certificate     /etc/letsencrypt/live/memoss.nathangracia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memoss.nathangracia.com/privkey.pem;

    client_max_body_size 30M;

    # WebSocket pour le jeu Memoss — DOIT être avant location /
    location /game/ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
