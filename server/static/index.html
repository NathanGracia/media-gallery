<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Gallery v3 — BUILD 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<!-- Animated background orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="noise"></div>

<header>
  <div class="header-inner">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="13" height="13" rx="3" fill="url(#g1)" opacity="0.9"/>
        <rect x="17" y="2" width="13" height="13" rx="3" fill="url(#g1)" opacity="0.5"/>
        <rect x="2" y="17" width="13" height="13" rx="3" fill="url(#g1)" opacity="0.5"/>
        <rect x="17" y="17" width="13" height="13" rx="3" fill="url(#g1)" opacity="0.9"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22d3ee"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="brand-name">Memoss</span>
    </div>

    <div class="storage-widget">
      <span class="storage-label" id="storage-text">—</span>
      <div class="storage-track">
        <div class="storage-bar" id="storage-bar"></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filter-tabs" id="filter-tabs">
      <button class="tab active" data-type="">Tout</button>
      <button class="tab" data-type="video">Vidéos</button>
      <button class="tab" data-type="image">Images</button>
    </div>

    <div class="filter-sep"></div>

    <div class="tag-chips" id="tag-tabs">
      <button class="chip active" data-tag="">Tous</button>
      <button class="chip chip-react" data-tag="react">React</button>
      <button class="chip chip-osef" data-tag="osef">Osef</button>
    </div>

    <div class="toolbar-right">
      <select id="feeder-select" class="feeder-select">
        <option value="">Tous les feeders</option>
      </select>
      <span class="count-badge" id="count-badge">0 fichiers</span>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="grid">
    <div class="skeleton-grid">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- Video Modal -->
<div class="overlay" id="video-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel video-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>
    <div class="vp-wrap">
      <video id="modal-video" playsinline controls></video>
    </div>
    <div class="overlay-footer">
      <span class="overlay-name" id="video-name"></span>
      <div class="overlay-actions">
        <button class="btn-copy-modal" id="video-copy" onclick="copyModalLink()" title="Copier le lien">Copier le lien</button>
        <a class="btn-dl" id="video-dl" download>Télécharger</a>
      </div>
    </div>
  </div>
</div>

<!-- Image Lightbox -->
<div class="overlay" id="image-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel image-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>
    <img id="modal-img" src="" alt="">
    <div class="overlay-footer">
      <span class="overlay-name" id="image-name"></span>
      <div class="overlay-actions">
        <button class="btn-copy-modal" id="image-copy" onclick="copyModalLink()" title="Copier le lien">Copier le lien</button>
        <a class="btn-dl" id="image-dl" download>Télécharger</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="app.js?v=5"></script>
</body>
</html>
