<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Gallery v3 — BUILD 4</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">Media Gallery</span>
      <span class="brand-version">v3</span>
    </div>
    <div class="storage-widget">
      <div class="storage-label">
        <span id="storage-text">—</span>
      </div>
      <div class="storage-track">
        <div class="storage-bar" id="storage-bar"></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filter-tabs" id="filter-tabs">
      <button class="tab active" data-type="">Tout</button>
      <button class="tab" data-type="video">Vidéos</button>
      <button class="tab" data-type="image">Images</button>
    </div>
    <div class="filter-sep"></div>
    <div class="tag-chips" id="tag-tabs">
      <button class="chip active" data-tag="">Tous</button>
      <button class="chip chip-react" data-tag="react">React</button>
      <button class="chip chip-osef" data-tag="osef">Osef</button>
    </div>
    <div class="toolbar-right">
      <select id="feeder-select" class="feeder-select">
        <option value="">Tous les feeders</option>
      </select>
      <span class="count-badge" id="count-badge">0 fichiers</span>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="grid">
    <div class="skeleton-grid">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<!-- Video Modal -->
<div class="overlay" id="video-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel video-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>

    <div class="vp-wrap">
      <video id="modal-video" playsinline controls></video>
    </div>

    <div class="overlay-footer">
      <span class="overlay-name" id="video-name"></span>
      <a class="btn-dl" id="video-dl" download>Télécharger</a>
    </div>
  </div>
</div>

<!-- Image Lightbox -->
<div class="overlay" id="image-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel image-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>
    <img id="modal-img" src="" alt="">
    <div class="overlay-footer">
      <span class="overlay-name" id="image-name"></span>
      <a class="btn-dl" id="image-dl" download>⬇ Télécharger</a>
    </div>
  </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="app.js?v=5"></script>
</body>
</html>
