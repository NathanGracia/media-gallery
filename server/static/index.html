<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memoss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%2322d3ee'/%3E%3Cstop offset='100%25' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='2' y='2' width='13' height='13' rx='3' fill='url(%23g)' opacity='0.9'/%3E%3Crect x='17' y='2' width='13' height='13' rx='3' fill='url(%23g)' opacity='0.5'/%3E%3Crect x='2' y='17' width='13' height='13' rx='3' fill='url(%23g)' opacity='0.5'/%3E%3Crect x='17' y='17' width='13' height='13' rx='3' fill='url(%23g)' opacity='0.9'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="nav.css?v=1">
  <link rel="stylesheet" href="style.css?v=37">
</head>
<body>

<video class="page-wallpaper" src="wallpaper.mp4?v=1" autoplay muted loop playsinline></video>
<div class="page-wallpaper-scrim"></div>

<!-- Animated background orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="noise"></div>

<header>
  <div class="header-inner">
    <div id="site-nav"></div>

    <div class="storage-widget">
      <span class="storage-label" id="storage-text">—</span>
      <div class="storage-track">
        <div class="storage-bar" id="storage-bar"></div>
      </div>
    </div>

    <div id="account-widget"></div>
  </div>

  <div class="toolbar">
    <div class="filter-tabs" id="filter-tabs">
      <button class="tab active" data-type="">Tout</button>
      <button class="tab" data-type="video">Vidéos</button>
      <button class="tab" data-type="image">Images</button>
    </div>

    <div class="filter-sep"></div>

    <div class="tag-chips" id="tag-tabs">
      <button class="chip" data-tag="">Tous</button>
      <button class="chip chip-cinema active" data-tag="cinema">Cinema</button>
      <button class="chip chip-osef" data-tag="osef">Osef</button>
      <button class="chip chip-todo" data-tag="todo">Todo</button>
    </div>

    <div class="toolbar-right">
      <select id="feeder-select" class="feeder-select">
        <option value="">Tous les feeders</option>
      </select>
      <button id="mosaic-btn" class="btn-mosaic" onclick="toggleMosaic()" title="Mode mosaïque">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
          <rect x="0" y="0" width="4" height="4" rx="0.5"/><rect x="5.5" y="0" width="4" height="4" rx="0.5"/><rect x="11" y="0" width="4" height="4" rx="0.5"/>
          <rect x="0" y="5.5" width="4" height="4" rx="0.5"/><rect x="5.5" y="5.5" width="4" height="4" rx="0.5"/><rect x="11" y="5.5" width="4" height="4" rx="0.5"/>
          <rect x="0" y="11" width="4" height="4" rx="0.5"/><rect x="5.5" y="11" width="4" height="4" rx="0.5"/><rect x="11" y="11" width="4" height="4" rx="0.5"/>
        </svg>
      </button>
      <span class="count-badge" id="count-badge">0 fichiers</span>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="grid">
    <div class="skeleton-grid">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </div>
  <div class="pagination" id="pagination"></div>
  <div id="mosaic-sentinel" hidden></div>
</main>

<!-- Video Modal -->
<div class="overlay" id="video-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel video-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>
    <div class="vp-wrap" id="vp-wrap">
      <video id="modal-video" playsinline controls></video>
      <div class="crop-overlay-top" id="crop-overlay-top"></div>
      <div class="crop-overlay-bot" id="crop-overlay-bot"></div>
    </div>
    <div class="crop-bar" id="crop-bar">
      <span class="crop-bar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg></span>
      <label class="crop-field">Haut <input type="number" id="crop-top" min="0" max="49" value="0" step="1" oninput="updateCropPreview()">%</label>
      <label class="crop-field">Bas <input type="number" id="crop-bottom" min="0" max="49" value="0" step="1" oninput="updateCropPreview()">%</label>
      <button class="btn-crop-apply" id="btn-crop" onclick="cropVideo()">Sauvegarder</button>
      <button class="btn-crop-cancel" onclick="toggleCropBar()">Annuler</button>
    </div>
    <div class="overlay-footer">
      <span class="overlay-name" id="video-name"></span>
      <div class="overlay-actions">
        <div class="overlay-tag-bar admin-only" id="video-tag-bar">
          <button class="overlay-tag-btn" data-tag="cinema" onclick="setTagFromOverlay('cinema')">Cinema</button>
          <button class="overlay-tag-btn" data-tag="osef"  onclick="setTagFromOverlay('osef')">Osef</button>
          <button class="overlay-tag-btn" data-tag="todo"  onclick="setTagFromOverlay('todo')">Todo</button>
        </div>
        <button class="btn-crop-toggle admin-only" onclick="toggleCropBar()" title="Rogner la vidéo">Rogner</button>
        <button class="btn-copy-modal" id="video-copy" onclick="copyModalLink()" title="Copier le lien">Copier le lien</button>
        <a class="btn-dl" id="video-dl" download>Télécharger</a>
        <button class="btn-delete admin-only" onclick="deleteCurrentMedia()" title="Supprimer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
      </div>
    </div>
    <div class="memoss-history" id="memoss-history"></div>
  </div>
</div>

<!-- Image Lightbox -->
<div class="overlay" id="image-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel image-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>
    <img id="modal-img" src="" alt="">
    <div class="overlay-footer">
      <span class="overlay-name" id="image-name"></span>
      <div class="overlay-actions">
        <button class="btn-copy-modal" id="image-copy" onclick="copyModalLink()" title="Copier le lien">Copier le lien</button>
        <a class="btn-dl" id="image-dl" download>Télécharger</a>
        <button class="btn-delete admin-only" onclick="deleteCurrentMedia()" title="Supprimer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="nav.js?v=1"></script>
<script>SiteNav.mount('site-nav', 'gallery');</script>
<script src="account-widget.js?v=3"></script>
<script src="app.js?v=42"></script>
</body>
</html>
