<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Gallery v3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">Media Gallery</span>
      <span class="brand-version">v3</span>
    </div>
    <div class="storage-widget">
      <div class="storage-label">
        <span id="storage-text">—</span>
      </div>
      <div class="storage-track">
        <div class="storage-bar" id="storage-bar"></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filter-tabs" id="filter-tabs">
      <button class="tab active" data-type="">Tout</button>
      <button class="tab" data-type="video">Vidéos</button>
      <button class="tab" data-type="image">Images</button>
    </div>
    <div class="filter-sep"></div>
    <div class="tag-chips" id="tag-tabs">
      <button class="chip active" data-tag="">Tous</button>
      <button class="chip chip-react" data-tag="react">React</button>
      <button class="chip chip-osef" data-tag="osef">Osef</button>
    </div>
    <div class="toolbar-right">
      <select id="feeder-select" class="feeder-select">
        <option value="">Tous les feeders</option>
      </select>
      <span class="count-badge" id="count-badge">0 fichiers</span>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="grid">
    <div class="skeleton-grid">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<!-- Video Modal -->
<div class="overlay" id="video-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel video-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>

    <div class="vp-wrap" id="vp-wrap">
      <video id="modal-video" playsinline preload="auto"></video>

      <!-- Big play button -->
      <div class="vp-center" id="vp-center" onclick="vpTogglePlay()">
        <div class="vp-big-btn" id="vp-big-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>

      <!-- Controls bar -->
      <div class="vp-controls" id="vp-controls">
        <!-- Progress -->
        <div class="vp-progress" id="vp-progress" onclick="vpSeek(event)">
          <div class="vp-progress-fill" id="vp-progress-fill"></div>
          <div class="vp-progress-thumb" id="vp-progress-thumb"></div>
        </div>

        <div class="vp-bar">
          <!-- Play/Pause -->
          <button class="vp-btn" id="vp-play" onclick="vpTogglePlay()" title="Lecture / Pause">
            <svg class="ico-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            <svg class="ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>

          <!-- Time -->
          <span class="vp-time" id="vp-time">0:00 / 0:00</span>

          <div class="vp-spacer"></div>

          <!-- Volume -->
          <div class="vp-vol-wrap">
            <button class="vp-btn" id="vp-mute" onclick="vpToggleMute()" title="Muet">
              <svg class="ico-vol" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
              <svg class="ico-mute" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
            <input class="vp-vol" id="vp-vol" type="range" min="0" max="1" step="0.05" value="1" oninput="vpVolume(this.value)">
          </div>

          <!-- Fullscreen -->
          <button class="vp-btn" onclick="vpFullscreen()" title="Plein écran">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="overlay-footer">
      <span class="overlay-name" id="video-name"></span>
      <a class="btn-dl" id="video-dl" download>Télécharger</a>
    </div>
  </div>
</div>

<!-- Image Lightbox -->
<div class="overlay" id="image-overlay" role="dialog" aria-modal="true">
  <div class="overlay-backdrop" onclick="closeOverlay()"></div>
  <div class="overlay-panel image-panel">
    <button class="overlay-close" onclick="closeOverlay()" aria-label="Fermer">✕</button>
    <img id="modal-img" src="" alt="">
    <div class="overlay-footer">
      <span class="overlay-name" id="image-name"></span>
      <a class="btn-dl" id="image-dl" download>⬇ Télécharger</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
